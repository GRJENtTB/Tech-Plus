<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cables & Connectors Match Game</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }
    header {
      background: #1e3a8a;
      color: white;
      padding: 24px 16px;
      text-align: center;
    }
    header h1 { margin: 0 0 8px; font-size: 2rem; }
    header p { margin: 0; font-size: 1rem; }
    main {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px 32px;
    }
    .panel {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }
    .badge {
      background: #e0f2fe;
      border: 1px solid #7dd3fc;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: bold;
    }
    .game-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 800px) {
      .game-grid { grid-template-columns: 1fr; }
    }
    .card-bank, .drop-bank {
      height: 420px;
      overflow-y: auto;
    }
    h2 { margin-top: 0; }
    .connector-card {
      background: #ffffff;
      border: 2px solid #cbd5e1;
      border-radius: 14px;
      padding: 14px;
      margin: 10px 0;
      cursor: grab;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
    }
    .connector-card:hover {
      transform: scale(1.02);
      border-color: #2563eb;
      background: #eff6ff;
    }
    .icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #e5e7eb;
      display: grid;
      place-items: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    
    .drop-zone {
      border: 2px dashed #94a3b8;
      border-radius: 14px;
      padding: 14px;
      margin: 10px 0;
      min-height: 74px;
      background: #f8fafc;
      transition: background 0.15s, border-color 0.15s;
    }
    .drop-zone strong { display: block; margin-bottom: 6px; }
    .drop-zone.over {
      background: #dcfce7;
      border-color: #16a34a;
    }
    .drop-zone.correct {
      background: #dcfce7;
      border-color: #22c55e;
    }
    .drop-zone.incorrect {
      background: #fee2e2;
      border-color: #ef4444;
    }
    .small {
      font-size: 0.9rem;
      color: #475569;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: bold;
      cursor: pointer;
      background: #2563eb;
      color: white;
      margin: 6px;
    }
    button.secondary { background: #475569; }
    button.success { background: #16a34a; }
    .feedback {
      font-size: 1.1rem;
      font-weight: bold;
      margin-top: 12px;
    }
    .hidden { display: none; }
    .quiz-option {
      display: block;
      width: 100%;
      text-align: left;
      margin: 8px 0;
      background: #f1f5f9;
      color: #1f2937;
      border: 1px solid #cbd5e1;
    }
    .quiz-option:hover { background: #dbeafe; }
  </style>
</head>
<body>
  <header>
    <h1>🔌 Cables & Connectors Match Game</h1>
    <p>Match each connector with the appropriate description.</p>
  </header>

  <main>
    <section class="panel stats">
      <span class="badge">Matches: <span id="matches">0</span>/8</span>
      <span class="badge">Mode: Drag & Match</span>
      <div>
        <button onclick="resetGame()" class="secondary">Reset Game</button>
        </div>
    </section>

    <section id="matchGame" class="game-grid">
      <div class="panel card-bank">
        <h2>Connector Cards</h2>
        <p class="small">Drag each card to the correct description.</p>
        <div id="cards"></div>
      </div>

      <div class="panel drop-bank">
        <h2>Descriptions</h2>
        <p class="small">Drop the matching connector here.</p>
        <div id="zones"></div>
        <div id="feedback" class="feedback"></div>
      </div>
    </section>

    <section id="quiz" class="panel hidden">
      <h2>Quick Quiz</h2>
      <p id="quizQuestion"></p>
      <div id="quizOptions"></div>
      <div id="quizFeedback" class="feedback"></div>
      <button onclick="nextQuestion()">Next Question</button>
      <button onclick="showMatchGame()" class="secondary">Back to Matching Game</button>
    </section>
  </main>

  <script>
    const connectors = [
      { id: "usb", name: "USB", icon: `<svg viewBox="0 0 64 64" width="34" height="34" aria-hidden="true"><g transform="rotate(180 32 32)"><g fill="none" stroke="#111827" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"><path d="M32 56V16"/><path d="M32 28L18 40"/><path d="M32 28L46 40"/></g><circle cx="32" cy="56" r="6" fill="#111827"/><circle cx="18" cy="40" r="5" fill="#111827"/><rect x="41" y="35" width="10" height="10" rx="1.5" fill="#111827"/><path d="M32 6L22 22H42L32 6Z" fill="#111827"/></g></svg>`, desc: "Common connector for peripherals such as keyboards, mice, flash drives, and printers." },
      { id: "usbc", name: "USB-C", icon: "⚡", desc: "Modern reversible connector that can support data and power." },
      { id: "hdmi", name: "HDMI", icon: "📺", desc: "Carries digital audio and video, commonly used with TVs, monitors, and game consoles." },
      { id: "displayport", name: "DisplayPort", icon: "🖥️", desc: "Digital audio/video connector commonly used with PCs and monitors." },
      { id: "vga", name: "VGA", icon: "🔵", desc: "Older 15-pin display connector that sends analog video only." },
      { id: "dvi", name: "DVI", icon: "🧱", desc: "A legacy video interface designed to handle digital and analog signals." },
      { id: "thunderbolt", name: "Thunderbolt", icon: "⚡", desc: "High-speed interface that carries data, video, and power; often uses the USB-C connector." },
      { id: "lightning", name: "Lightning", icon: "🍎", desc: "Proprietary Apple connector used for charging, data, and audio on older Apple devices." }
    ];

    const quizQuestions = [
      { q: "Which connector carries digital audio and video and is common on TVs?", options: ["VGA", "HDMI", "DVI", "Serial"], answer: "HDMI" },
      { q: "Which connector is reversible and commonly used on modern devices?", options: ["USB-C", "VGA", "DVI", "SATA"], answer: "USB-C" },
      { q: "Which connector sends analog video only?", options: ["VGA", "USB-C", "DisplayPort", "HDMI"], answer: "VGA" },
      { q: "Which connector is primarily used for digital video on older monitors?", options: ["DVI", "USB", "RJ-11", "PS/2"], answer: "DVI" },
      { q: "Which interface can carry data, video, and power at high speeds using a USB-C port?", options: ["Thunderbolt", "VGA", "DVI", "Serial"], answer: "Thunderbolt" }
    ];

    let score = 0;
    let matches = 0;
    let currentQuestion = 0;

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function renderGame() {
      const cardBox = document.getElementById("cards");
      const zoneBox = document.getElementById("zones");
      cardBox.innerHTML = "";
      zoneBox.innerHTML = "";

      shuffle(connectors).forEach(item => {
        const card = document.createElement("div");
        card.className = "connector-card";
        card.draggable = true;
        card.id = item.id;
        card.innerHTML = `<div class="icon">${item.icon}</div><div><strong>${item.name}</strong><br><span class="small">Drag me</span></div>`;
        card.addEventListener("dragstart", dragStart);
        cardBox.appendChild(card);
      });

      shuffle(connectors).forEach(item => {
        const zone = document.createElement("div");
        zone.className = "drop-zone";
        zone.dataset.answer = item.id;
        zone.innerHTML = `<strong>${item.desc}</strong><span class="small">Drop connector here</span>`;
        zone.addEventListener("dragover", dragOver);
        zone.addEventListener("dragleave", dragLeave);
        zone.addEventListener("drop", dropCard);
        zoneBox.appendChild(zone);
      });
    }

    function dragStart(e) {
      const card = e.target.closest('.connector-card');
      e.dataTransfer.setData("text/plain", card.id);
    }

    function dragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add("over");
    }

    function dragLeave(e) {
      e.currentTarget.classList.remove("over");
    }

    function dropCard(e) {
      e.preventDefault();
      const cardId = e.dataTransfer.getData("text/plain");
      const zone = e.currentTarget;
      zone.classList.remove("over");

      if (zone.dataset.answer === cardId) {
        const card = document.getElementById(cardId);
        zone.classList.add("correct");
        zone.classList.remove("incorrect");
        zone.appendChild(card);
        card.draggable = false;
        card.style.cursor = "default";
        score += 10;
        matches += 1;
        document.getElementById("feedback").textContent = "Correct! Nice match.";
      } else {
        zone.classList.add("incorrect");
        score = Math.max(0, score - 2);
        document.getElementById("feedback").textContent = "Try again. Look for the best use case.";
        setTimeout(() => zone.classList.remove("incorrect"), 800);
      }

      updateStats();
      if (matches === connectors.length) {
        document.getElementById("feedback").textContent = "Great job! You matched all connectors.";
      }
    }

    function updateStats() {
      document.getElementById("matches").textContent = matches;
    }

    function resetGame() {
      score = 0;
      matches = 0;
      document.getElementById("feedback").textContent = "";
      updateStats();
      renderGame();
      showMatchGame();
    }

    function showQuiz() {
      document.getElementById("matchGame").classList.add("hidden");
      document.getElementById("quiz").classList.remove("hidden");
      currentQuestion = 0;
      renderQuestion();
    }

    function showMatchGame() {
      document.getElementById("quiz").classList.add("hidden");
      document.getElementById("matchGame").classList.remove("hidden");
    }

    function renderQuestion() {
      const item = quizQuestions[currentQuestion];
      document.getElementById("quizQuestion").textContent = item.q;
      document.getElementById("quizFeedback").textContent = "";
      const optionsBox = document.getElementById("quizOptions");
      optionsBox.innerHTML = "";

      item.options.forEach(option => {
        const button = document.createElement("button");
        button.className = "quiz-option";
        button.textContent = option;
        button.onclick = () => checkAnswer(option);
        optionsBox.appendChild(button);
      });
    }

    function checkAnswer(option) {
      const item = quizQuestions[currentQuestion];
      const feedback = document.getElementById("quizFeedback");
      if (option === item.answer) {
        feedback.textContent = "Correct!";
        score += 5;
      } else {
        feedback.textContent = `Not quite. Correct answer: ${item.answer}`;
      }
      updateStats();
    }

    function nextQuestion() {
      currentQuestion = (currentQuestion + 1) % quizQuestions.length;
      renderQuestion();
    }

    renderGame();
  </script>
</body>
</html>
