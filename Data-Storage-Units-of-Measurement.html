<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storage Unit Ladder Activity</title>
  <style>
    :root {
      --primary: #2563eb;
      --success: #16a34a;
      --danger: #dc2626;
      --light: #f8fafc;
      --border: #cbd5e1;
      --text: #0f172a;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #eef2ff;
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 16px;
      text-align: center;
    }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 16px;
      height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h1, h2 {
      margin: 0;
    }

    .instructions {
      background: var(--light);
      border-left: 6px solid var(--primary);
      padding: 12px;
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .activity-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      flex: 1;
      overflow: hidden;
    }

    .bank, .ladder {
      border: 2px dashed var(--border);
      padding: 12px;
      border-radius: 12px;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .bank h2, .ladder h2 {
      font-size: 1rem;
      text-align: center;
      margin-bottom: 8px;
    }

    .unit-card {
      background: white;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      margin: 6px 0;
      cursor: grab;
      font-weight: bold;
      text-align: center;
      user-select: none;
    }

    .slot {
      background: white;
      border: 2px dashed var(--border);
      border-radius: 10px;
      min-height: 45px;
      margin: 6px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slot-label {
      font-size: 0.75rem;
      color: #64748b;
    }

    .slot-wrapper {
      margin-bottom: 6px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .check-btn { background: var(--success); color: white; }
    .reset-btn { background: var(--danger); color: white; }

    #feedback {
      text-align: center;
      font-size: 1rem;
      font-weight: bold;
    }

    .correct { border-color: var(--success); background: #dcfce7; }
    .incorrect { border-color: var(--danger); background: #fee2e2; }

    @media (max-width: 750px) {
      body { overflow: auto; }
      main { height: auto; }
      .activity-area { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Storage Unit Ladder</h1>
    <p>Arrange storage units from smallest to largest</p>
  </header>

  <main>
    <section class="instructions">
      Place each storage unit onto the ladder, starting with the smallest at the top and ending with the largest at the bottom.
    </section>

    <section class="activity-area">
      <div class="bank" id="unitBank">
        <h2>Bank</h2>
        <div class="unit-card" draggable="true" data-unit="Terabyte">Terabyte (TB)</div>
        <div class="unit-card" draggable="true" data-unit="Kilobyte">Kilobyte (KB)</div>
        <div class="unit-card" draggable="true" data-unit="Petabyte">Petabyte (PB)</div>
        <div class="unit-card" draggable="true" data-unit="Byte">Byte (B)</div>
        <div class="unit-card" draggable="true" data-unit="Megabyte">Megabyte (MB)</div>
        <div class="unit-card" draggable="true" data-unit="Gigabyte">Gigabyte (GB)</div>
      </div>

      <div class="ladder">
        <h2>Ladder</h2>

        <div class="slot-wrapper"><div class="slot-label">1</div><div class="slot" data-position="0"></div></div>
        <div class="slot-wrapper"><div class="slot-label">2</div><div class="slot" data-position="1"></div></div>
        <div class="slot-wrapper"><div class="slot-label">3</div><div class="slot" data-position="2"></div></div>
        <div class="slot-wrapper"><div class="slot-label">4</div><div class="slot" data-position="3"></div></div>
        <div class="slot-wrapper"><div class="slot-label">5</div><div class="slot" data-position="4"></div></div>
        <div class="slot-wrapper"><div class="slot-label">6</div><div class="slot" data-position="5"></div></div>
      </div>
    </section>

    <section class="buttons">
      <button class="check-btn" onclick="checkAnswers()">Check</button>
      <button class="reset-btn" onclick="resetActivity()">Reset</button>
    </section>

    <div id="feedback"></div>
  </main>

  <script>
    const correctOrder = ["Byte", "Kilobyte", "Megabyte", "Gigabyte", "Terabyte", "Petabyte"];
    let draggedCard = null;

    document.querySelectorAll(".unit-card").forEach(card => {
      card.addEventListener("dragstart", () => {
        draggedCard = card;
        setTimeout(() => card.style.display = "none", 0);
      });

      card.addEventListener("dragend", () => {
        draggedCard.style.display = "block";
        draggedCard = null;
      });
    });

    document.querySelectorAll(".slot, .bank").forEach(dropZone => {
      dropZone.addEventListener("dragover", event => event.preventDefault());

      dropZone.addEventListener("drop", event => {
        event.preventDefault();
        if (!draggedCard) return;

        if (dropZone.classList.contains("slot")) {
          if (dropZone.children.length > 0) {
            document.getElementById("unitBank").appendChild(dropZone.children[0]);
          }
          dropZone.appendChild(draggedCard);
        } else {
          dropZone.appendChild(draggedCard);
        }

        clearFeedbackStyles();
      });
    });

    function checkAnswers() {
      const slots = document.querySelectorAll(".slot");
      let score = 0;
      let completed = true;

      slots.forEach((slot, index) => {
        slot.classList.remove("correct", "incorrect");

        if (slot.children.length === 0) {
          completed = false;
          slot.classList.add("incorrect");
          return;
        }

        const selectedUnit = slot.children[0].dataset.unit;

        if (selectedUnit === correctOrder[index]) {
          score++;
          slot.classList.add("correct");
        } else {
          slot.classList.add("incorrect");
        }
      });

      const feedback = document.getElementById("feedback");

      if (!completed) {
        feedback.textContent = "Fill all spaces first.";
        feedback.style.color = "#dc2626";
      } else if (score === correctOrder.length) {
        feedback.textContent = "Correct!";
        feedback.style.color = "#16a34a";
      } else {
        feedback.textContent = `Score: ${score}/6`;
        feedback.style.color = "#dc2626";
      }
    }

    function resetActivity() {
      const bank = document.getElementById("unitBank");
      const cards = Array.from(document.querySelectorAll(".unit-card"));
      cards.sort(() => Math.random() - 0.5);
      cards.forEach(card => bank.appendChild(card));
      clearFeedbackStyles();
      document.getElementById("feedback").textContent = "";
    }

    function clearFeedbackStyles() {
      document.querySelectorAll(".slot").forEach(slot => {
        slot.classList.remove("correct", "incorrect");
      });
    }
  </script>
</body>
</html>
